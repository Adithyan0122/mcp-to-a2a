name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'v1.0/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r v1.0/requirements.txt

      - name: Lint check
        run: python -m py_compile v1.0/shared/llm.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd v1.0
          railway up --detach

  eval:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r v1.0/requirements.txt

      - name: Wait for deployment
        run: sleep 60

      - name: Run eval harness
        env:
          API_GATEWAY_URL: ${{ secrets.RAILWAY_GATEWAY_URL }}
        run: |
          cd v1.0
          python evals/run_evals.py
