# Supply Chain v1.0 — Docker Compose
# Start everything: docker compose up --build

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: supply_chain_v1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Market API ────────────────────────────────────────────────────────────

  market-api:
    build:
      context: .
      dockerfile: market-api/Dockerfile
    ports:
      - "9000:9000"
    environment:
      PORT: 9000
      VOLATILITY: 0.02
      DRIFT: 0.001
      TICK_INTERVAL: 1

  # ── Pricing Agent ─────────────────────────────────────────────────────────

  pricing-agent:
    build:
      context: .
      dockerfile: pricing-agent/Dockerfile
    ports:
      - "9001:9001"
    env_file: .env
    environment:
      PORT: 9001
      MARKET_API_URL: http://market-api:9000
      INVENTORY_AGENT_URL: http://inventory-agent:8000
      DB_HOST: postgres
      DB_NAME: supply_chain_v1
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
      market-api:
        condition: service_started

  # ── Inventory Agent ───────────────────────────────────────────────────────

  inventory-agent:
    build:
      context: .
      dockerfile: inventory-agent/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_NAME: supply_chain_v1
      DB_USER: postgres
      DB_PASSWORD: postgres
      SUPPLIER_A_URL: http://supplier-a:8011
      SUPPLIER_B_URL: http://supplier-b:8012
      SUPPLIER_C_URL: http://supplier-c:8013
      ORDER_AGENT_URL: http://order-agent:8001
      NOTIFICATION_AGENT_URL: http://notification-agent:8002
      FINANCE_AGENT_URL: http://finance-agent:8003
    depends_on:
      postgres:
        condition: service_healthy

  # ── Supplier Agents ───────────────────────────────────────────────────────

  supplier-a:
    build:
      context: .
      dockerfile: supplier-agent/Dockerfile
    ports:
      - "8011:8011"
    environment:
      PORT: 8011
      SUPPLIER_NAME: SupplierA
      BASE_PRICE_MULTIPLIER: 1.2
      DELIVERY_DAYS: 2
      RELIABILITY: 0.95

  supplier-b:
    build:
      context: .
      dockerfile: supplier-agent/Dockerfile
    ports:
      - "8012:8012"
    environment:
      PORT: 8012
      SUPPLIER_NAME: SupplierB
      BASE_PRICE_MULTIPLIER: 1.0
      DELIVERY_DAYS: 4
      RELIABILITY: 0.90

  supplier-c:
    build:
      context: .
      dockerfile: supplier-agent/Dockerfile
    ports:
      - "8013:8013"
    environment:
      PORT: 8013
      SUPPLIER_NAME: SupplierC
      BASE_PRICE_MULTIPLIER: 0.85
      DELIVERY_DAYS: 7
      RELIABILITY: 0.80

  # ── Order Agent ───────────────────────────────────────────────────────────

  order-agent:
    build:
      context: .
      dockerfile: order-agent/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_NAME: supply_chain_v1
      DB_USER: postgres
      DB_PASSWORD: postgres
      NOTIFICATION_AGENT_URL: http://notification-agent:8002
      FINANCE_AGENT_URL: http://finance-agent:8003
    depends_on:
      postgres:
        condition: service_healthy

  # ── Notification Agent ────────────────────────────────────────────────────

  notification-agent:
    build:
      context: .
      dockerfile: notification-agent/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      DB_HOST: postgres

  # ── Finance Agent ─────────────────────────────────────────────────────────

  finance-agent:
    build:
      context: .
      dockerfile: finance-agent/Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_NAME: supply_chain_v1
      DB_USER: postgres
      DB_PASSWORD: postgres
      NOTIFICATION_AGENT_URL: http://notification-agent:8002
    depends_on:
      postgres:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────────

  celery-worker:
    build:
      context: .
      dockerfile: celery-worker/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      PRICING_AGENT_URL: http://pricing-agent:9001
      INVENTORY_AGENT_URL: http://inventory-agent:8000
      ORDER_AGENT_URL: http://order-agent:8001
      NOTIFICATION_AGENT_URL: http://notification-agent:8002
      FINANCE_AGENT_URL: http://finance-agent:8003
    depends_on:
      redis:
        condition: service_healthy

  # ── API Gateway ───────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      MARKET_API_URL: http://market-api:9000
      PRICING_AGENT_URL: http://pricing-agent:9001
      INVENTORY_AGENT_URL: http://inventory-agent:8000
      SUPPLIER_A_URL: http://supplier-a:8011
      SUPPLIER_B_URL: http://supplier-b:8012
      SUPPLIER_C_URL: http://supplier-c:8013
      ORDER_AGENT_URL: http://order-agent:8001
      NOTIFICATION_AGENT_URL: http://notification-agent:8002
      FINANCE_AGENT_URL: http://finance-agent:8003
      API_GATEWAY_URL: http://api-gateway:8080
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      - api-gateway

volumes:
  pgdata:
